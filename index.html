  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Heebo',sans-serif; background:#f5f5f5; direction:rtl; }

    /* ── Colors ── */
    :root {
      --dark: #1a1a2e;
      --accent: #e74c3c;
      --green: #27ae60;
      --gray: #888;
      --light: #f5f5f5;
    }

    /* ── Header ── */
    #header {
      background: var(--dark);
      color: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 500;
      height: 50px;
    }
    #header-title { font-size:20px; font-weight:900; letter-spacing:-0.5px; }
    #header-actions { display:flex; gap:10px; align-items:center; }
    .header-btn {
      background:none; border:none; color:white;
      font-size:20px; cursor:pointer; padding:4px;
    }

    /* ── Map ── */
    #map { height:100vh; width:100%; padding-top:50px; }

    /* ── Bottom buttons ── */
    #post-btn {
      position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
      background:#F44336; color:white; border:none;
      width:56px; height:56px; border-radius:50%;
      font-size:28px; font-weight:700; cursor:pointer;
      z-index:900; box-shadow:0 4px 16px rgba(244,67,54,0.4);
      font-family:'Heebo',sans-serif;
      display:flex; align-items:center; justify-content:center;
      line-height:1;
    }

    #center-btn, #my-items-btn, #requests-btn {
      position:fixed; right:16px;
      background:white; border:none; border-radius:50%;
      width:46px; height:46px; font-size:20px; cursor:pointer;
      z-index:2000; box-shadow:0 3px 10px rgba(0,0,0,0.2);
      display:flex; align-items:center; justify-content:center;
    }
    #center-btn { bottom:24px; }
    #my-items-btn { bottom:78px; font-size:16px; }
    #requests-btn { bottom:132px; }

    .unread-dot {
      display:none;
      position:absolute; top:-2px; right:-2px;
      width:14px; height:14px; background:#e74c3c;
      border-radius:50%; border:2px solid white;
    }
    .unread-dot.show { display:block; }

    /* ── Swipe to action ── */
    .swipe-wrap { position:relative; overflow:hidden; border-radius:12px; margin-bottom:10px; }
    .swipe-reveal {
      position:absolute; inset:0; display:flex; align-items:center;
      justify-content:flex-start; padding-right:24px;
      background:var(--green); color:white; font-size:18px; font-weight:800;
      border-radius:12px;
    }
    .swipe-front { position:relative; touch-action:pan-y; will-change:transform; }
    .swipe-front .item-card, .swipe-front .request-card { margin-bottom:0; }

    /* ── History ── */
    .history-card {
      background:white; border-radius:12px; padding:14px; margin-bottom:10px;
      box-shadow:0 2px 8px rgba(0,0,0,0.06);
    }
    .history-card-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
    .history-date { font-size:12px; color:var(--gray); }
    .history-title { font-size:16px; font-weight:700; color:var(--dark); margin-top:6px; }

    /* ── My requests list ── */
    .request-card {
      background:white; border-radius:12px; margin-bottom:10px;
      box-shadow:0 2px 8px rgba(0,0,0,0.06); overflow:hidden;
    }
    .request-card-head {
      display:flex; align-items:center; justify-content:space-between;
      padding:14px; cursor:pointer;
    }
    .request-card-title { font-size:15px; font-weight:700; color:var(--dark); }
    .request-card-status { font-size:12px; font-weight:700; padding:3px 10px; border-radius:20px; white-space:nowrap; }
    .request-card-status.pending { background:#f0f0f0; color:var(--gray); }
    .request-card-status.approved { background:#eafbf0; color:var(--green); }
    .request-card-details { padding:0 14px 14px; border-top:1px solid #f2f2f2; }
    .request-detail-img { width:100%; height:130px; object-fit:cover; border-radius:8px; margin:12px 0 8px; }
    .request-detail-line { font-size:13px; color:#444; margin-top:6px; }
    .request-detail-desc { font-size:14px; color:#444; line-height:1.5; margin-top:8px; }
    .request-phone { font-size:15px; font-weight:700; color:var(--green); margin-top:10px; }
    .request-phone a { color:var(--green); text-decoration:none; }
    .request-cancel-btn {
      width:100%; margin-top:14px; padding:10px; border:none; border-radius:8px;
      background:var(--accent); color:white; font-size:14px; font-weight:700;
      cursor:pointer; font-family:'Heebo',sans-serif;
    }

    .item-unread-dot {
      display:inline-block; width:9px; height:9px; background:var(--accent);
      border-radius:50%; margin:0 6px; vertical-align:middle;
    }
    
    /* Give/Take toggle */
    .type-toggle { display:flex; gap:10px; margin-bottom:16px; }
    .type-btn {
      flex:1; padding:12px; border-radius:10px; border:2px solid #ddd;
      font-size:15px; font-weight:700; cursor:pointer;
      font-family:'Heebo',sans-serif; background:white; color:#888;
      transition: all 0.2s;
    }
    .type-btn.give-active { background:#e74c3c; border-color:#e74c3c; color:white; }
    .type-btn.take-active { background:#27ae60; border-color:#27ae60; color:white; }

    /* ── Panels (slide-up) ── */
    .panel {
      position:fixed; top:0; left:0; right:0; bottom:0;
      background:white; z-index:3000;
      display:none; flex-direction:column;
      overflow-y:auto;
    }
    .panel.open { display:flex; }
    .panel-header {
      background:var(--dark); color:white;
      padding:14px 16px; display:flex;
      align-items:center; gap:12px;
      position:sticky; top:0; z-index:1;
    }
    .panel-back { background:none; border:none; color:white; font-size:18px; cursor:pointer; }
    .panel-title { font-size:17px; font-weight:700; }
    .panel-body { padding:20px 16px; flex:1; }

    /* ── Forms ── */
    .form-group { margin-bottom:16px; }
    .form-label { font-size:13px; color:var(--gray); margin-bottom:6px; display:block; font-weight:600; }
    .form-input, .form-select, .form-textarea {
      width:100%; padding:12px 14px; border:1.5px solid #ddd;
      border-radius:10px; font-size:15px; font-family:'Heebo',sans-serif;
      direction:rtl; background:white;
    }
    .form-textarea { min-height:100px; resize:vertical; }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color:var(--dark); outline:none;
    }

    /* ── Buttons ── */
    .btn-primary {
      width:100%; background:var(--dark); color:white; border:none;
      padding:14px; border-radius:12px; font-size:16px;
      font-weight:700; cursor:pointer; font-family:'Heebo',sans-serif;
      margin-top:8px;
    }
    .btn-secondary {
      width:100%; background:white; color:var(--dark);
      border:2px solid var(--dark); padding:12px; border-radius:12px;
      font-size:15px; font-weight:600; cursor:pointer;
      font-family:'Heebo',sans-serif; margin-top:8px;
    }
    .btn-danger {
      width:100%; background:var(--accent); color:white; border:none;
      padding:12px; border-radius:12px; font-size:15px;
      font-weight:600; cursor:pointer; font-family:'Heebo',sans-serif;
      margin-top:8px;
    }

    /* ── Photo upload ── */
    #photo-upload-area {
      border:2px dashed #ddd; border-radius:12px;
      padding:24px; text-align:center; cursor:pointer;
      color:var(--gray); font-size:14px;
      transition:border-color 0.2s;
    }
    #photo-upload-area:hover { border-color:var(--dark); }
    #photo-preview { width:100%; border-radius:10px; max-height:200px; object-fit:cover; display:none; margin-top:10px; }

    /* ── Item card (my items) ── */
    .item-card {
      background:white; border-radius:12px;
      padding:14px; margin-bottom:12px;
      box-shadow:0 2px 8px rgba(0,0,0,0.06);
      cursor:pointer;
    }
    .item-card:active { background:#fafafa; }
    /* RTL: justify-content:flex-end packs to the LEFT. DOM order badge-then-X
       therefore renders visually as [X][badge] at the top-left. */
    .item-card-top {
      display:flex; justify-content:space-between; align-items:center;
      gap:8px; margin-bottom:8px;
    }
    .item-badge {
      display:inline-block;
      font-size:12px; font-weight:700; color:white;
      padding:3px 10px; border-radius:20px; white-space:nowrap;
    }
    .item-badge.give { background:var(--accent); }
    .item-badge.take { background:var(--green); }

    .item-delete-x {
      background:none; border:none; color:var(--accent);
      font-size:17px; font-weight:700; line-height:1;
      width:26px; height:26px; padding:0; flex-shrink:0;
      cursor:pointer; font-family:'Heebo',sans-serif;
    }
    .item-card-title { font-size:16px; font-weight:700; color:var(--dark); margin-bottom:4px; }
    .item-card-meta { font-size:12px; color:var(--gray); margin-bottom:8px; }
    .item-card-actions { display:flex; gap:8px; }
    .item-card-btn {
      flex:1; padding:8px; border-radius:8px;
      font-size:13px; font-weight:600; cursor:pointer;
      border:none; font-family:'Heebo',sans-serif;
    }

    /* ── Requester card ── */
    .requester-card {
      background:#f9f9f9; border-radius:10px;
      padding:12px; margin-bottom:8px;
      display:flex; align-items:center; justify-content:space-between;
    }
    .requester-name { font-size:15px; font-weight:700; color:var(--dark); }
    .requester-meta { font-size:12px; color:var(--gray); }
    .requester-approve-btn {
      background:var(--green); color:white; border:none;
      padding:8px 18px; border-radius:8px; font-size:14px; font-weight:700;
      cursor:pointer; font-family:'Heebo',sans-serif; flex-shrink:0;
    }
    .requester-approve-btn:active { opacity:0.8; }
    .requester-approved { font-size:13px; font-weight:700; color:var(--green); flex-shrink:0; }
    .requester-phone {
      font-size:15px; font-weight:700; color:var(--dark);
      margin-top:4px; text-decoration:none;
    }

    .leaflet-top.leaflet-left { top: 58px !important; }

    /* ── Progress bar ── */
    #post-progress {
      display:flex; align-items:center; gap:8px;
      padding:0 16px 12px; border-bottom:1px solid #f0f0f0;
    }
    .progress-step {
      flex:1; height:4px; border-radius:2px; background:#eee;
      transition:background 0.3s;
    }
    .progress-step.active { background:var(--dark); }
    .progress-step.done { background:#27ae60; }
    #post-step-label {
      font-size:12px; color:var(--gray); text-align:center;
      padding:8px 16px 0; font-weight:600;
    }

    /* ── Toast ── */
    #toast {
      position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.8); color:white;
      padding:10px 20px; border-radius:20px; font-size:13px;
      z-index:9999; opacity:0; transition:opacity 0.3s;
      pointer-events:none; white-space:nowrap;
    }
    #toast.show { opacity:1; }

    #interest-banner {
      position:fixed; top:50px; left:0; right:0;
      background:var(--green); color:white;
      padding:14px 16px;
      /* display:none keeps it out of the render tree entirely when idle.
         JS flips it to flex just before animating in, and back to none
         once the slide-out transition has finished. */
      display:none;
      align-items:center; justify-content:space-between; gap:12px;
      z-index:9998; box-shadow:0 4px 14px rgba(0,0,0,0.3);
      /* Must travel its own full height PLUS the 50px top offset (plus margin for
         the shadow) to clear the screen — a plain % only moves it by its own height. */
      transform:translateY(calc(-100% - 70px)); transition:transform 0.35s ease;
      pointer-events:none;
      font-size:15px; font-weight:700; cursor:pointer; font-family:'Heebo',sans-serif;
    }
    #interest-banner.show { transform:translateY(0); pointer-events:auto; }
    #interest-banner button {
      background:rgba(255,255,255,0.25); color:white; border:none;
      border-radius:6px; width:26px; height:26px; font-size:14px;
      cursor:pointer; flex-shrink:0;
    }

    /* ── Loading ── */
    #loading {
      position:fixed; top:0; left:0; right:0; bottom:0;
      background:#000000; z-index:99998;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
    }
    #loading-logo { font-size:52px; font-weight:900; color:white; letter-spacing:-1px; }
    #loading-sub { font-size:16px; color:var(--accent); margin-top:8px; margin-bottom:40px; }
    #loading-spinner {
      width:40px; height:40px;
      border:3px solid rgba(255,255,255,0.2);
      border-top-color:var(--accent);
      border-radius:50%;
      animation:spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── Setup screen ── */
    #setup-screen {
      position:fixed; top:0; left:0; right:0; bottom:0;
      background:var(--dark); z-index:99997;
      display:none; flex-direction:column;
      align-items:center; justify-content:center;
      padding:30px 24px;
    }
    #setup-screen h1 { color:white; font-size:36px; font-weight:900; margin-bottom:8px; }
    #setup-screen p { color:rgba(255,255,255,0.6); font-size:14px; margin-bottom:30px; text-align:center; }
    #setup-screen .form-input, #setup-screen .form-select {
      background:rgba(255,255,255,0.1); border-color:rgba(255,255,255,0.2);
      color:white; margin-bottom:12px;
    }
    #setup-screen .form-label { color:rgba(255,255,255,0.7); }
    #setup-screen .btn-primary { background:var(--accent); margin-top:16px; }

    /* ── Item popup (map) ── */
    .item-popup { min-width:220px; direction:rtl; text-align:right; }
    .item-popup-top { margin-bottom:8px; text-align:left; }
    /* Bigger, bolder badge specifically inside the map popup, pinned top-left */
    .item-popup-top .item-badge {
      font-size:14px; font-weight:800;
      padding:5px 14px; border-radius:20px;
    }

    /* RTL: slider is first in the DOM so it sits on the right, putting the
       arrows on the left. direction:ltr on the group fixes the arrows in a
       predictable ← then → order. */
    .radius-row { display:flex; align-items:center; gap:10px; }
    .radius-row input[type=range] { flex:1; min-width:0; }
    .radius-arrows { display:flex; gap:4px; direction:ltr; flex-shrink:0; }
    .radius-arrow {
      background:#f0f0f0; border:none; border-radius:6px;
      width:32px; height:32px; padding:0; line-height:1;
      font-size:15px; font-weight:700; color:var(--dark);
      cursor:pointer; font-family:'Heebo',sans-serif;
    }
    .radius-arrow:active { background:#dcdcdc; }
    .item-popup-img { width:100%; height:140px; object-fit:cover; border-radius:8px; margin-bottom:10px; }
    .item-popup-title { font-size:15px; font-weight:700; color:var(--dark); margin-bottom:4px; }
    .item-popup-cat { font-size:12px; color:var(--gray); margin-bottom:8px; }
    .item-popup-desc { font-size:13px; color:#444; margin-bottom:10px; line-height:1.5; }
    .item-popup-by { font-size:12px; color:var(--gray); margin-bottom:2px; }
    .item-popup-interest { font-size:12px; color:var(--gray); margin-bottom:10px; }
    .item-popup-approved {
      font-size:14px; font-weight:700; color:var(--green);
      background:#eafbf0; border-radius:8px; padding:8px; margin-bottom:8px;
      text-align:center;
    }
    .item-popup-approved a { color:var(--green); }
    .item-popup-btn {
      width:100%; background:var(--dark); color:white; border:none;
      padding:10px; border-radius:8px; font-size:14px; font-weight:700;
      cursor:pointer; font-family:'Heebo',sans-serif;
    }
    .item-popup-btn.requested { background:var(--green); }
    .item-popup-report {
      width:100%; background:none; color:var(--gray); border:none;
      padding:6px; font-size:12px; cursor:pointer; margin-top:4px;
      font-family:'Heebo',sans-serif;
    }
    .item-popup-info {
      width:100%; background:#f0f0f0; color:var(--dark); border:none;
      padding:8px; border-radius:8px; font-size:13px; font-weight:600;
      cursor:pointer; margin-top:6px; font-family:'Heebo',sans-serif;
    }

    /* ── Side menu ── */
    #side-menu {
      position:fixed; top:0; left:0; bottom:0; width:260px;
      background:white; z-index:3000;
      transform:translateX(-100%); transition:transform 0.3s ease;
      display:flex; flex-direction:column;
      box-shadow:4px 0 20px rgba(0,0,0,0.2);
    }
    #side-menu.open { transform:translateX(0); }
    #menu-overlay {
      position:fixed; top:0; left:0; right:0; bottom:0;
      background:rgba(0,0,0,0.4); z-index:2999; display:none;
    }
    #menu-overlay.open { display:block; }
    #menu-header { background:var(--dark); color:white; padding:20px 16px; font-size:18px; font-weight:700; }
    .menu-item {
      padding:16px; font-size:15px; color:var(--dark);
      border-bottom:1px solid #f0f0f0; cursor:pointer;
    }
    .menu-item:hover { background:#f9f9f9; }
    .menu-item-danger { color:var(--accent); font-weight:700; }

    /* ── Radius slider ── */
    input[type=range] { width:100%; accent-color:var(--dark); }
    #setup-screen input[type=range] { accent-color:white; }
    #radius-display { font-size:22px; font-weight:700; color:var(--dark); text-align:center; margin:8px 0; }
    #setup-screen #radius-display { color:white; }
    /* ── Upload overlay ── */
    #upload-overlay {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5);
      z-index:6000; flex-direction:column; align-items:center; justify-content:center;
      color:white;
    }
    #upload-overlay.show { display:flex; }
    #upload-spinner {
      width:48px; height:48px; border-radius:50%;
      border:5px solid rgba(255,255,255,0.3); border-top-color:white;
      animation:upload-spin 0.8s linear infinite;
    }
    #upload-overlay-text { margin-top:16px; font-size:16px; font-weight:700; }
    @keyframes upload-spin { to { transform: rotate(360deg); } }
  </style>
</head>

  window._loadingTimer = setTimeout(function() {
    var el = document.getElementById('loading');

    // If no user saved, show setup
    if (!localStorage.getItem('ineed_user') && setup) {

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
const API_BASE = 'https://ineed-0otk.onrender.com';

// ── Swipe-to-action helper ─────────────────────────────
// Attaches to a wrapper that contains a .swipe-reveal (behind) and a
// .swipe-front (the moving card). Swiping the front to the right past a
// threshold fires onCommit(). Distinguishes horizontal swipe from vertical
// scroll so the list still scrolls normally.
function attachSwipe(wrapper, onCommit) {
  const front = wrapper.querySelector('.swipe-front');
  if (!front) return;
  let startX = 0, startY = 0, dx = 0, dragging = false, decided = false, horizontal = false;
  const THRESHOLD = 90; // px to the right to trigger

  front.addEventListener('touchstart', e => {
    const t = e.touches[0];
    startX = t.clientX; startY = t.clientY;
    dx = 0; dragging = true; decided = false; horizontal = false;
    front.style.transition = 'none';
  }, { passive: true });

  front.addEventListener('touchmove', e => {
    if (!dragging) return;
    const t = e.touches[0];
    const mx = t.clientX - startX;
    const my = t.clientY - startY;
    if (!decided) {
      // Decide direction on first meaningful movement.
      if (Math.abs(mx) > 8 || Math.abs(my) > 8) {
        decided = true;
        horizontal = Math.abs(mx) > Math.abs(my);
      }
    }
    if (horizontal) {
      dx = Math.max(0, mx); // only allow rightward drag
      front.style.transform = `translateX(${dx}px)`;
      if (e.cancelable) e.preventDefault(); // stop the list from scrolling mid-swipe
    }
  }, { passive: false });

  front.addEventListener('touchend', () => {
    if (!dragging) return;
    dragging = false;
    front.style.transition = 'transform 0.25s ease';
    if (horizontal && dx >= THRESHOLD) {
      front.style.transform = 'translateX(100%)';
      setTimeout(() => onCommit(), 200);
    } else {
      front.style.transform = 'translateX(0)';
    }
  });
}


// ── Device ID ──────────────────────────────────────────
let deviceId = localStorage.getItem('ineed_device_id');
if (!deviceId) {
  deviceId = 'user_' + Math.random().toString(36).substr(2, 12);
  localStorage.setItem('ineed_device_id', deviceId);
}

async function initDeviceId() {
  if (window.Capacitor && window.Capacitor.isNativePlatform() && window.Capacitor.Plugins && window.Capacitor.Plugins.Device) {
    try {
      const info = await window.Capacitor.Plugins.Device.getId();
      if (info && info.identifier) {
        deviceId = 'device_' + info.identifier;
        localStorage.setItem('ineed_device_id', deviceId);
      }
    } catch(e) {}
  }
}

// ── User state ─────────────────────────────────────────
let currentUser = null;
let userLat = null, userLon = null;

// ── Map ────────────────────────────────────────────────
const map = L.map('map').setView([31.9730, 34.7895], 14);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

const clusterGroup = L.markerClusterGroup({ maxClusterRadius: 60, disableClusteringAtZoom: 16 });
map.addLayer(clusterGroup);

let itemMarkers = {};
let itemsData = [];

// ── Categories colors ──────────────────────────────────
const catColors = {
  'ריהוט': '#8e44ad',
  'אלקטרוניקה': '#2980b9',
  'ביגוד והנעלה': '#e74c3c',
  'ספרים ולימוד': '#f39c12',
  'מטבח וכלי בית': '#16a085',
  'צעצועים וילדים': '#e91e63',
  'ספורט ופנאי': '#27ae60',
  'גינה וכלי עבודה': '#795548',
  'אחר': '#607d8b',
};

function makeItemIcon(category) {
  const color = catColors[category] || '#607d8b';
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">
    <path d="M14 0C6.27 0 0 6.27 0 14c0 10.5 14 22 14 22S28 24.5 28 14C28 6.27 21.73 0 14 0z" fill="${color}"/>
    <circle cx="14" cy="14" r="7" fill="white"/>
  </svg>`;
  return L.divIcon({ html: svg, iconSize:[28,36], iconAnchor:[14,36], popupAnchor:[0,-36], className:'' });
}

// ── Load items ─────────────────────────────────────────
const MIN_ZOOM = 12;

// ── Radius filtering ───────────────────────────────────
// Great-circle distance in km between two lat/lon points.
function distanceKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat / 2) ** 2 +
            Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

function getRadiusKm() {
  const r = currentUser && currentUser.radius_km;
  return (typeof r === 'number' && r > 0) ? r : 5;
}

function filterByRadius(items) {
  // Without a location fix we can't measure distance. Rather than showing an
  // empty map (e.g. if location permission was denied), fall back to showing
  // whatever is in view — filtering resumes as soon as a fix arrives.
  if (userLat === null || userLon === null) return items;
  const radius = getRadiusKm();
  return items.filter(i => distanceKm(userLat, userLon, i.lat, i.lon) <= radius);
}

async function loadItems() {
  if (map.getZoom() < MIN_ZOOM) {
    clusterGroup.clearLayers();
    Object.keys(itemMarkers).forEach(id => delete itemMarkers[id]);
    return;
  }
  const b = map.getBounds();
  // Pad the fetch area beyond the visible viewport. Without this, pins sitting
  // right at the screen edge flicker out as you pan (the fetch box moves and no
  // longer includes them). The padding keeps a buffer of off-screen pins loaded.
  const latPad = (b.getNorth() - b.getSouth()) * 0.5;
  const lonPad = (b.getEast() - b.getWest()) * 0.5;
  const params = new URLSearchParams({
    lat_min: (b.getSouth() - latPad).toFixed(5),
    lat_max: (b.getNorth() + latPad).toFixed(5),
    lon_min: (b.getWest() - lonPad).toFixed(5),
    lon_max: (b.getEast() + lonPad).toFixed(5),
    device_id: deviceId
  });
  const res = await fetch(`${API_BASE}/items?${params}`);
  const allItems = await res.json();

  // Only show items within the user's chosen radius.
  const items = filterByRadius(allItems);

  // Hide loading after first load
  const loadingEl = document.getElementById('loading');
  if (loadingEl) loadingEl.remove();

  // Merge into itemsData
  items.forEach(item => {
    const idx = itemsData.findIndex(x => x.id === item.id);
    if (idx >= 0) itemsData[idx] = item;
    else itemsData.push(item);
  });

  // Drop any marker that shouldn't be shown any more — either it left the
  // viewport, or it's now outside the radius (e.g. after a settings change).
  const visibleIds = new Set(items.map(i => i.id));
  Object.keys(itemMarkers).forEach(id => {
    if (!visibleIds.has(Number(id))) {
      clusterGroup.removeLayer(itemMarkers[id]);
      delete itemMarkers[id];
    }
  });

  // Add/update markers
  items.forEach(item => {
    const popupHTML = buildItemPopup(item);
    if (itemMarkers[item.id]) {
      itemMarkers[item.id].setPopupContent(popupHTML);
    } else {
      const m = L.marker([item.lat, item.lon], { icon: makeItemIcon(item.category) })
        .bindPopup(popupHTML, { maxWidth: 260 });
      itemMarkers[item.id] = m;
      clusterGroup.addLayer(m);
    }
  });
}

// Wording helpers — a 'give' post is something offered (others want it),
// a 'take' post is something wanted (others can offer it).
function isTakePost(item) { return item && item.post_type === 'take'; }

// Build a WhatsApp chat link from an Israeli phone number.
// WhatsApp needs country code, no leading zero, no '+': 05XXXXXXXX -> 9725XXXXXXXX
function waLink(phone) {
  const digits = (phone || '').replace(/\D/g, '');       // keep digits only
  const intl = digits.replace(/^0/, '972');              // 05... -> 9725...
  return `https://wa.me/${intl}`;
}
function interestActionLabel(item) { return isTakePost(item) ? 'יש לי את זה!' : 'אני רוצה את זה!'; }
function interestCancelLabel(item) { return isTakePost(item) ? 'מציע — לחץ לביטול' : 'מעוניין — לחץ לביטול'; }
function interestCountLabel(item) { return isTakePost(item) ? 'מציעים' : 'מתעניינים'; }
function requestersPanelLabel(item) { return isTakePost(item) ? 'מי מציע' : 'מי רוצה'; }

function buildItemPopup(item) {
  const myRequests = JSON.parse(localStorage.getItem('my_requests') || '{}');
  const requested = myRequests[item.id];
  const isMyItem = item.device_id === deviceId;
  // If I'm a taker whose request on this item was approved, show the giver phone.
  const approvals = JSON.parse(localStorage.getItem('ineed_my_approvals') || '{}');
  const approvedPhone = approvals[item.id];
  return `
    <div class="item-popup">
      <div class="item-popup-top"><span class="item-badge ${isTakePost(item) ? 'take' : 'give'}">${isTakePost(item) ? 'אני צריך' : 'אני מוסר'}</span></div>
      ${item.image_url ? `<img src="${item.image_url}" class="item-popup-img"/>` : ''}
      <div class="item-popup-title">${item.title}</div>
      <div class="item-popup-cat">${item.category}</div>
      ${item.description ? `<div class="item-popup-desc">${item.description}</div>` : ''}
      <div class="item-popup-by">מאת: ${item.nickname}</div>
      <div class="item-popup-interest">${item.request_count} ${interestCountLabel(item)}</div>
      ${approvedPhone ? `<div class="item-popup-approved">אושר! <a href="${waLink(approvedPhone)}" target="_blank" style="direction:ltr;">💬 ${approvedPhone}</a></div>` : ''}
      ${!isMyItem ? `
        <button class="item-popup-btn ${requested ? 'requested' : ''}"
          onclick="${requested ? `cancelInterest(${item.id})` : `expressInterest(${item.id})`}">
          ${requested ? interestCancelLabel(item) : interestActionLabel(item)}
        </button>
        <button class="item-popup-report" onclick="reportImage(${item.id})"> דווח על תמונה</button>
      ` : `<div style="font-size:12px;color:var(--gray);text-align:center;padding:8px;">זה הפריט שלך</div>`}
    </div>`;
}

// ── Interest ───────────────────────────────────────────
async function expressInterest(itemId) {
  const res = await fetch(`${API_BASE}/request`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ item_id: itemId, device_id: deviceId })
  });
  const data = await res.json();
  if (data.ok) {
    const myRequests = JSON.parse(localStorage.getItem('my_requests') || '{}');
    myRequests[itemId] = true;
    localStorage.setItem('my_requests', JSON.stringify(myRequests));
    const item = itemsData.find(i => i.id === itemId);
    showToast(isTakePost(item) ? 'עדכנו את המבקש שיש לך את הפריט!' : 'הבעת עניין! בעל הפריט יעודכן');
    map.closePopup();
    loadItems();
  }
}

async function cancelInterest(itemId) {
  await fetch(`${API_BASE}/request/${itemId}?device_id=${encodeURIComponent(deviceId)}`, { method: 'DELETE' });
  const myRequests = JSON.parse(localStorage.getItem('my_requests') || '{}');
  delete myRequests[itemId];
  localStorage.setItem('my_requests', JSON.stringify(myRequests));
  showToast('בוטל');
  map.closePopup();
  loadItems();
}

  await fetch(`${API_BASE}/report-image`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ item_id: itemId, reporter_device_id: deviceId, reason: 'user report' })
  });
  showToast('הדיווח נשלח. תודה!');
  map.closePopup();
}

// ── Post item ──────────────────────────────────────────
function removePhoto() {
  document.getElementById('photo-input').value = '';
  document.getElementById('photo-preview').src = '';
  document.getElementById('photo-preview-container').style.display = 'none';
  document.getElementById('photo-upload-area').style.display = 'block';
}

function previewPhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('photo-preview').src = e.target.result;
    document.getElementById('photo-preview-container').style.display = 'block';
    document.getElementById('photo-upload-area').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

async function submitItem() {
  const title = document.getElementById('post-title').value.trim();
  const category = document.getElementById('post-category').value;
  const desc = document.getElementById('post-desc').value.trim();
  const photoInput = document.getElementById('photo-input');

  if (!selectedPostType) { showToast('נא לבחור למסור או לקחת'); return; }
  if (!title || !category) { showToast('נא למלא כותרת וקטגוריה'); return; }
  if (itemLat === null || itemLon === null) { showToast('נא להגדיר מיקום לפריט'); return; }

  const form = new FormData();
  form.append('device_id', deviceId);
  form.append('post_type', selectedPostType);
  form.append('title', title);
  form.append('description', desc);
  form.append('category', category);
  form.append('lat', itemLat);
  form.append('lon', itemLon);
  if (photoInput.files[0]) form.append('image', photoInput.files[0]);

  const btn = document.querySelector('#post-panel .btn-primary');
  btn.textContent = 'מפרסם...';
  btn.disabled = true;
  document.getElementById('upload-overlay').classList.add('show');

  let res, data;
  try {
    res = await fetch(`${API_BASE}/item`, { method: 'POST', body: form });
    data = await res.json();
  } catch (e) {
    document.getElementById('upload-overlay').classList.remove('show');
    btn.textContent = 'פרסם פריט';
    btn.disabled = false;
    showToast('שגיאה בהעלאה — בדוק את החיבור לאינטרנט');
    return;
  }

  document.getElementById('upload-overlay').classList.remove('show');
  btn.textContent = 'פרסם פריט';
  btn.disabled = false;

  if (data.ok) {
    showToast('הפריט פורסם בהצלחה!');
    closePanel('post-panel');
    // Reset form
    document.getElementById('post-title').value = '';
    document.getElementById('post-category').value = '';
    document.getElementById('post-desc').value = '';
    document.getElementById('photo-input').value = '';
    const pc = document.getElementById('photo-preview-container'); if(pc) pc.style.display = 'none';
    document.getElementById('photo-upload-area').style.display = 'block';
    selectedPostType = null;
    document.getElementById('btn-give').className = 'type-btn';
    document.getElementById('btn-take').className = 'type-btn';
    loadItems();
  } else {
    showToast('שגיאה — נסה שוב');
  }
}

let myItemsData = [];

let myRequestsData = [];

async function openMyRequests(expandItemId) {
  document.querySelectorAll('.panel.open').forEach(p => p.classList.remove('open'));
  openPanel('my-requests-panel');
  const body = document.getElementById('my-requests-body');
  body.innerHTML = '<p style="color:var(--gray);text-align:center;">טוען...</p>';

  try {
    const res = await fetch(`${API_BASE}/my-outgoing-requests/${deviceId}`);
    const rows = await res.json();
    myRequestsData = rows;
    renderMyRequestsList(rows);
    // If asked, auto-expand the row for a specific item (e.g. tapped an approval banner).
    if (expandItemId != null) {
      const match = rows.find(r => r.item_id === expandItemId);
      if (match) {
        const el = document.getElementById(`request-details-${match.id}`);
        if (el) el.style.display = 'block';
        const card = el ? el.closest('.request-card') : null;
        if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }
  } catch (e) {
    body.innerHTML = '<p style="color:var(--gray);text-align:center;">שגיאה בטעינה. נסה שוב.</p>';
  }
}

function renderMyRequestsList(rows) {
  const body = document.getElementById('my-requests-body');
  if (!rows || rows.length === 0) {
    body.innerHTML = '<p style="color:var(--gray);text-align:center;margin-top:40px;">עדיין לא ביקשת פריטים.<br>לחץ "אני רוצה את זה!" על פריט במפה.</p>';
    return;
  }

  body.innerHTML = rows.map(r => {
    const isApproved = r.status === 'approved';
    const cardInner = `
    <div class="request-card">
      <div class="request-card-head" onclick="toggleRequestDetails(${r.id})">
        <span class="request-card-title">${r.item_title}</span>
        <span class="request-card-status ${isApproved ? 'approved' : 'pending'}">${isApproved ? 'אושר ✓' : 'ממתין'}</span>
      </div>
      <div class="request-card-details" id="request-details-${r.id}" style="display:none;">
        ${r.item_image_url ? `<img src="${r.item_image_url}" class="request-detail-img"/>` : ''}
        <div class="request-detail-line">${r.item_category || ''}</div>
        ${r.item_description ? `<div class="request-detail-desc">${r.item_description}</div>` : ''}
        <div class="request-detail-line">מאת: ${r.giver_name}</div>
        ${isApproved && r.giver_phone
          ? `<div class="request-phone">💬 <a href="${waLink(r.giver_phone)}" target="_blank" style="direction:ltr;">${r.giver_phone}</a></div>`
          : '<div class="request-detail-line" style="color:var(--gray);">מספר הטלפון יופיע לאחר אישור המוסר</div>'}
        <button class="request-cancel-btn" onclick="cancelRequestFromList(${r.item_id})">בטל בקשה</button>
      </div>
    </div>`;
    if (!isApproved) return cardInner; // can only swipe לקחתי after approval
    return `
      <div class="swipe-wrap" data-request-id="${r.id}">
        <div class="swipe-reveal">לקחתי!</div>
        <div class="swipe-front">${cardInner}</div>
      </div>`;
  }).join('');

  // Wire up swipe handlers for approved rows.
  body.querySelectorAll('.swipe-wrap[data-request-id]').forEach(wrap => {
    const requestId = Number(wrap.getAttribute('data-request-id'));
    attachSwipe(wrap, () => takeRequest(requestId));
  });
}

async function takeRequest(requestId) {
  try {
    const res = await fetch(`${API_BASE}/request/${requestId}/take?device_id=${encodeURIComponent(deviceId)}`, { method: 'POST' });
    if (!res.ok) { showToast('שגיאה — נסה שוב'); openMyRequests(); return; }
    showToast('נוסף להיסטוריה!');
    openMyRequests();
  } catch (e) {
    showToast('שגיאה בחיבור');
    openMyRequests();
  }
}

      <div class="item-card" onclick="openEditItem(${item.id})">
        <div class="item-card-top">

          <button class="item-delete-x" title="מחק" onclick="event.stopPropagation(); deleteItem(${item.id})">✕</button>

        <div class="requester-meta">${new Date(r.created_at * 1000).toLocaleDateString('he-IL')}</div>
        ${isApproved && r.requester_phone
          ? `<a href="${waLink(r.requester_phone)}" target="_blank" class="requester-phone" style="direction:ltr;display:inline-block;">💬 ${r.requester_phone}</a>`
          : ''}
      </div>

        ? `<span class="requester-approved">מאושר ✓</span>`
        : `<button class="requester-approve-btn" onclick="approveRequest(${r.id}, ${itemId})">אשר</button>`}

  }).join('');
}

async function completeSetup() {
  const nickname = document.getElementById('setup-nickname').value.trim();
  const radius = parseInt(document.getElementById('setup-radius').value);
  const email = document.getElementById('setup-email').value.trim();
  const phone = document.getElementById('setup-phone').value.trim();

  if (!nickname) { showToast('נא להזין כינוי'); return; }
  // Phone: exactly 10 digits, must start with 05.
  if (!/^05\d{8}$/.test(phone)) { showToast('מספר טלפון חייב להיות 10 ספרות ולהתחיל ב-05'); return; }

  const btn = document.querySelector('#setup-screen .btn-primary');

  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 10000);
    
    const res = await fetch(`${API_BASE}/user/setup`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ device_id: deviceId, nickname, radius_km: radius, email: email || null, phone }),

    });

      localStorage.setItem('ineed_user', JSON.stringify(currentUser));

    btn.disabled = false;
  }
}

// ── Location ───────────────────────────────────────────
let centeredOnUser = false;
async function startLocation() {
  // Request location permission on native Android
  if (window.Capacitor && window.Capacitor.isNativePlatform()) {
    let attempts = 0;
    while (attempts < 20) {
      if (window.Capacitor.Plugins && window.Capacitor.Plugins.Geolocation) break;
      await new Promise(r => setTimeout(r, 200));
      attempts++;
    }
    if (window.Capacitor.Plugins && window.Capacitor.Plugins.Geolocation) {
      try { await window.Capacitor.Plugins.Geolocation.requestPermissions(); } catch(e) {}
    }
  }
  if (!navigator.geolocation) return;
  navigator.geolocation.watchPosition(pos => {
    userLat = pos.coords.latitude;
    userLon = pos.coords.longitude;
    if (!centeredOnUser) {
      centeredOnUser = true;
      map.setView([userLat, userLon], 14);
    }
  }, (err) => {
    console.log('Location error:', err);
  }, { enableHighAccuracy: true, maximumAge: 5000 });
}

function centerOnUser() {
  if (userLat !== null && userLon !== null) {
    map.flyTo([userLat, userLon], 15);
  } else if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      userLat = pos.coords.latitude;
      userLon = pos.coords.longitude;
      map.flyTo([userLat, userLon], 15);
    });
  } else {
    showToast('לא ניתן לאתר מיקום');
  }
}

let selectedPostType = null;
let currentPostStep = 1;
let locationMode = 'current';

function selectPostType(type) {
  selectedPostType = type;
  document.getElementById('btn-give').className = 'type-btn' + (type === 'give' ? ' give-active' : '');
  document.getElementById('btn-take').className = 'type-btn' + (type === 'take' ? ' take-active' : '');
  setTimeout(() => postStepNext(), 300);
}

function updateProgressBar(step) {
  for (let i = 1; i <= 3; i++) {
    const el = document.getElementById('ps' + i);
    if (!el) continue;
    if (i < step) el.className = 'progress-step done';
    else if (i === step) el.className = 'progress-step active';
    else el.className = 'progress-step';
  }
  const labels = ['שלב 1: למסור או לקחת', 'שלב 2: פרטי הפריט', 'שלב 3: תמונה'];
  const lbl = document.getElementById('post-step-label');
  if (lbl) lbl.textContent = labels[step - 1];
}

function showPostStep(step) {
  for (let i = 1; i <= 3; i++) {
    const el = document.getElementById('post-step-' + i);
    if (el) el.style.display = i === step ? 'block' : 'none';
  }
  currentPostStep = step;
  updateProgressBar(step);
}

function postStepNext() {
  if (currentPostStep === 1) {
    if (!selectedPostType) { showToast('נא לבחור למסור או לקחת'); return; }
    showPostStep(2);
  } else if (currentPostStep === 2) {
    const title = document.getElementById('post-title').value.trim();
    const category = document.getElementById('post-category').value;
    if (!title || !category) { showToast('נא למלא כותרת וקטגוריה'); return; }
    if (locationMode === 'current' && userLat !== null && userLon !== null) {
      itemLat = userLat;
      itemLon = userLon;
    }
    if (itemLat === null || itemLon === null) {
      showToast(locationMode === 'current' ? 'עדיין מאתר את מיקומך, נסה שוב או הזן כתובת' : 'נא לאתר כתובת לפני שממשיכים');
      return;
    }
    const hint = document.getElementById('photo-hint');
    if (hint) hint.textContent = selectedPostType === 'give'
      ? 'תמונה של הפריט מגדילה משמעותית את הסיכוי למצוא מישהו שירצה אותו. מומלץ מאוד!'
      : 'תמונה של מה שאתה מחפש עוזרת לאחרים להבין בדיוק מה אתה צריך.';
    showPostStep(3);
  }
}

function postStepBack() {

    closePanel('post-panel');

async function geocodeAddress() {

  itemLon = null;

    const res = await fetch(`https://nominatim.openstreetmap.org/search?${params}`);
    const results = await res.json();

      status.textContent = 'לא נמצאה כתובת מתאימה. נסה לנסח אחרת.';
    }
  } catch (e) {
    status.textContent = 'שגיאה באיתור הכתובת. בדוק את החיבור לאינטרנט ונסה שוב.';

let interestBannerTimeout = null;
let interestBannerHideTimeout = null;
let interestBannerTarget = 'my-items'; // which panel a tap should open
let interestBannerItemId = null; // specific item row to expand (my-requests only)

function showInterestBanner(message, target, itemId) {
  interestBannerTarget = target || 'my-items';
  interestBannerItemId = (itemId != null) ? itemId : null;
  const banner = document.getElementById('interest-banner');
  clearTimeout(interestBannerTimeout);
  clearTimeout(interestBannerHideTimeout);

  document.getElementById('interest-banner-text').textContent = message;

  // Enter the render tree, then force a reflow so the browser registers the
  // off-screen start position. Without this, adding .show in the same frame
  // would snap it into place with no slide animation.
  banner.style.display = 'flex';
  void banner.offsetHeight;
  banner.classList.add('show');

  interestBannerTimeout = setTimeout(() => dismissInterestBanner(false), 6000);
}

function dismissInterestBanner(openItems) {
  const banner = document.getElementById('interest-banner');
  clearTimeout(interestBannerTimeout);
  clearTimeout(interestBannerHideTimeout);

  banner.classList.remove('show');

  // Let the slide-out play, then drop it out of the render tree entirely.
  interestBannerHideTimeout = setTimeout(() => {
    banner.style.display = 'none';
  }, 400); // slightly longer than the 0.35s transition

  if (openItems) {
    if (interestBannerTarget === 'my-requests') openMyRequests(interestBannerItemId);
    else openMyItems();
  }
}

async function checkForNewInterest() {
  try {
    const res = await fetch(`${API_BASE}/my-item-requests/${deviceId}`);
    if (!res.ok) return;
    const rows = await res.json();

    const storedRaw = localStorage.getItem('ineed_notified_request_ids');
    const isFirstRun = storedRaw === null;
    const notified = JSON.parse(storedRaw || '[]');
    const notifiedSet = new Set(notified);

    if (isFirstRun) {
      // First time this device checks — establish a baseline so pre-existing
      // requests don't all fire as "new" at once.
      rows.forEach(r => notifiedSet.add(r.id));
      localStorage.setItem('ineed_notified_request_ids', JSON.stringify(Array.from(notifiedSet)));
      return;
    }

    const newRows = rows.filter(r => !notifiedSet.has(r.id));
    if (newRows.length === 0) return;

    newRows.forEach(r => notifiedSet.add(r.id));
    localStorage.setItem('ineed_notified_request_ids', JSON.stringify(Array.from(notifiedSet)));
    setUnreadDot(true);

    const unreadItems = getUnreadItemIds();
    newRows.forEach(r => unreadItems.add(r.item_id));
    saveUnreadItemIds(unreadItems);

    const single = newRows[0];
    const singleIsTake = isTakePost(single);
    const message = newRows.length === 1
      ? (singleIsTake
          ? `ל${single.requester_name} יש "${single.item_title}" בשבילך`
          : `${single.requester_name} מעוניין ב"${single.item_title}"`)
      : `יש ${newRows.length} עדכונים חדשים על הפריטים שלך`;
    showInterestBanner(message, 'my-items');

    const notifTitle = newRows.length === 1 && singleIsTake
      ? 'מישהו מצא את מה שחיפשת!'
      : 'מישהו מעוניין בפריט שלך!';

    if (window.Capacitor && window.Capacitor.isNativePlatform() && window.Capacitor.Plugins && window.Capacitor.Plugins.LocalNotifications) {
      try {
        await window.Capacitor.Plugins.LocalNotifications.schedule({
          notifications: [{
            id: Math.floor(Date.now() % 2147483647),
            title: notifTitle,
            body: message,
            schedule: { at: new Date(Date.now() + 1000) }
          }]
        });
      } catch(e) {}
    }
  } catch(e) {
    console.log('Interest check failed:', e);
  }
}

// ── Taker side: detect when a giver approves my request ──
async function checkForApprovals() {
  try {
    const res = await fetch(`${API_BASE}/my-outgoing-requests/${deviceId}`);
    if (!res.ok) return;
    const rows = await res.json();

    // Only approved requests are interesting here.
    const approved = rows.filter(r => r.status === 'approved');

    const storedRaw = localStorage.getItem('ineed_notified_approval_ids');
    const isFirstRun = storedRaw === null;
    const notifiedSet = new Set(JSON.parse(storedRaw || '[]'));

    // Cache giver phone by item_id so the pin popup can reveal it (always, even first run).
    const approvalsMap = JSON.parse(localStorage.getItem('ineed_my_approvals') || '{}');
    approved.forEach(r => { if (r.giver_phone) approvalsMap[r.item_id] = r.giver_phone; });
    localStorage.setItem('ineed_my_approvals', JSON.stringify(approvalsMap));

    if (isFirstRun) {
      // Baseline so pre-existing approvals don't all fire at once.
      approved.forEach(r => notifiedSet.add(r.id));
      localStorage.setItem('ineed_notified_approval_ids', JSON.stringify(Array.from(notifiedSet)));
      return;
    }

    const newlyApproved = approved.filter(r => !notifiedSet.has(r.id));
    if (newlyApproved.length === 0) return;

    newlyApproved.forEach(r => notifiedSet.add(r.id));
    localStorage.setItem('ineed_notified_approval_ids', JSON.stringify(Array.from(notifiedSet)));

    const single = newlyApproved[0];
    const message = newlyApproved.length === 1
      ? `${single.giver_name} אישר את הבקשה שלך ל"${single.item_title}"`
      : `${newlyApproved.length} מהבקשות שלך אושרו`;
    showInterestBanner(message, 'my-requests', newlyApproved.length === 1 ? single.item_id : null);

    if (window.Capacitor && window.Capacitor.isNativePlatform() && window.Capacitor.Plugins && window.Capacitor.Plugins.LocalNotifications) {
      try {
        await window.Capacitor.Plugins.LocalNotifications.schedule({
          notifications: [{
            id: Math.floor((Date.now() + 1) % 2147483647),
            title: 'הבקשה שלך אושרה!',
            body: message,
            schedule: { at: new Date(Date.now() + 1000) }
          }]
        });
      } catch(e) {}
    }
  } catch(e) {
    console.log('Approval check failed:', e);
  }
}

// ── Reminder: approved but not yet swiped as gave/took ──
async function checkPendingExchanges() {
  try {
    const res = await fetch(`${API_BASE}/pending-exchanges/${deviceId}`);
    if (!res.ok) return;
    const rows = await res.json();
    if (!rows || rows.length === 0) {
      setPendingExchangeDot(false);
      return;
    }
    // There are items awaiting my confirmation — light the dot.
    setPendingExchangeDot(true);

    const storedRaw = localStorage.getItem('ineed_reminded_exchange_ids');
    const isFirstRun = storedRaw === null;
    const remindedSet = new Set(JSON.parse(storedRaw || '[]'));

    if (isFirstRun) {
      rows.forEach(r => remindedSet.add(r.item_id));
      localStorage.setItem('ineed_reminded_exchange_ids', JSON.stringify(Array.from(remindedSet)));
      return; // dot is shown, but don't fire a notification retroactively
    }

    const newOnes = rows.filter(r => !remindedSet.has(r.item_id));
    if (newOnes.length === 0) return;
    newOnes.forEach(r => remindedSet.add(r.item_id));
    localStorage.setItem('ineed_reminded_exchange_ids', JSON.stringify(Array.from(remindedSet)));

    const single = newOnes[0];
    const gaveOrTook = single.post_type === 'give' ? 'מסרת' : 'לקחת';
    const message = newOnes.length === 1
      ? `האם ${gaveOrTook} את "${single.title}"? החלק ימינה כדי לאשר`
      : `יש ${newOnes.length} פריטים שממתינים לאישור מסירה/קבלה`;
    showInterestBanner(message, 'my-items');

    if (window.Capacitor && window.Capacitor.isNativePlatform() && window.Capacitor.Plugins && window.Capacitor.Plugins.LocalNotifications) {
      try {
        await window.Capacitor.Plugins.LocalNotifications.schedule({
          notifications: [{
            id: Math.floor((Date.now() + 2) % 2147483647),
            title: 'אישור מסירה/קבלה',
            body: message,
            schedule: { at: new Date(Date.now() + 1000) }
          }]
        });
      } catch(e) {}
    }
  } catch(e) {
    console.log('Pending-exchange check failed:', e);
  }
}

function setPendingExchangeDot(show) {
  const dot = document.getElementById('my-items-dot');
  if (!dot) return;
  // Reuse the My Items dot; either unread interest OR a pending exchange lights it.
  if (show) {
    dot.classList.add('show');
  }
  // Note: we don't force-hide here, since unread interest may also want it on.
}

function startApp() {
  // Remove loading screen immediately - don't wait for data
  const loadingEl = document.getElementById('loading');
  if (loadingEl) loadingEl.remove();
  startLocation();
  loadItems();
  map.on('moveend', loadItems);
  setInterval(loadItems, 30000);

  requestNotificationPermission();
  setUnreadDot(localStorage.getItem('ineed_has_unread_interest') === '1');
  checkForNewInterest();
  setInterval(checkForNewInterest, 20000);
  checkForApprovals();
  setInterval(checkForApprovals, 20000);
  checkPendingExchanges();
  setInterval(checkPendingExchanges, 25000);
}

async function syncMyRequests() {
  try {
    const res = await fetch(`${API_BASE}/my-requests/${deviceId}`);
    if (res.ok) {
      const itemIds = await res.json();
      const myRequests = {};
      itemIds.forEach(id => myRequests[id] = true);
      localStorage.setItem('my_requests', JSON.stringify(myRequests));
    }
  } catch(e) {
    console.log('Failed to sync requests:', e);
  }
}

async function init() {
  // Check if user exists locally
  const saved = localStorage.getItem('ineed_user');
  if (saved) {
    currentUser = JSON.parse(saved);
    // Verify still exists on server
    try {
      const res = await fetch(`${API_BASE}/user/${deviceId}`);
      if (res.ok) {
        currentUser = await res.json();
        localStorage.setItem('ineed_user', JSON.stringify(currentUser));
        document.getElementById('loading').remove();
        await syncMyRequests();
        startApp();
        return;
      }
    } catch(e) {}
  }
  // New user — show setup
  document.getElementById('loading').remove();
  document.getElementById('setup-screen').style.display = 'flex';
}

initDeviceId().then(init).catch(e => {
  console.error('Init error:', e);
  const loadingEl = document.getElementById('loading');
  if (loadingEl) loadingEl.remove();
  const setup = document.getElementById('setup-screen');
  if (!localStorage.getItem('ineed_user') && setup) setup.style.display = 'flex';
});
</script>
