<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול הפריטים שלי</title>
    <style>
        /* CSS Variables used in your JS code */
        :root {
            --dark: #222222;
            --gray: #777777;
            --green: #2ecc71;
            --accent: #e74c3c;
            --light-bg: #f9f9f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            color: var(--dark);
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }

        button.main-btn {
            background-color: var(--green);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button.main-btn:hover {
            opacity: 0.9;
        }

        /* Panel Styling */
        .panel {
            display: none; /* Hidden by default */
            position: fixed;
            top: 0;
            right: 0;
            width: 100%;
            max-width: 500px;
            height: 100%;
            background: white;
            box-shadow: -5px 0 15px rgba(0,0,0,0.1);
            z-index: 1000;
            overflow-y: auto;
            box-sizing: border-box;
            padding: 20px;
            transition: transform 0.3s ease;
        }

        /* Show the panel when the 'open' class is active */
        .panel.open {
            display: block;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--gray);
        }

        /* Item Card Styling */
        .item-card {
            background: var(--light-bg);
            border: 1px solid #e1e1e1;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            text-align: right;
        }

        .item-card-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .item-card-meta {
            font-size: 14px;
            color: var(--gray);
            margin-bottom: 12px;
        }

        .item-card-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-start;
        }

        .item-card-btn {
            flex: 1;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
            transition: transform 0.1s;
        }

        .item-card-btn:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>האפליקציה שלי</h1>
        <p>לחץ למטה כדי לצפות בפריטים שהעלית למערכת:</p>
        <button class="main-btn" onclick="openMyItems()">הפריטים שלי</button>
    </div>

    <!-- The My Items Panel -->
    <div id="my-items-panel" class="panel">
        <div class="panel-header">
            <h2>הפריטים שלי</h2>
            <button class="close-btn" onclick="closePanel('my-items-panel')">&times;</button>
        </div>
        <div id="my-items-body">
            <!-- Dynamic item cards will be generated here -->
        </div>
    </div>

    <script>
        // --- 1. Global App Configuration ---
        // Replace this with your actual Render API URL (e.g., https://your-app.onrender.com)
        const API_BASE = "http://localhost:10000"; 
        
        // A placeholder device ID (you can dynamically grab this from localStorage or cookie)
        const deviceId = "test-device-123"; 

        // --- 2. Panel Navigation Logic ---
        function openPanel(panelId) {
            const panel = document.getElementById(panelId);
            if (panel) {
                panel.classList.add('open');
            }
        }

        function closePanel(panelId) {
            const panel = document.getElementById(panelId);
            if (panel) {
                panel.classList.remove('open');
            }
        }

        function closeMenu() {
            // If you have a mobile sidebar menu, close it here.
            console.log("Menu closed.");
        }

        // --- 3. The Debugged openMyItems Function ---
        async function openMyItems() {
            // Close any open panels first
            document.querySelectorAll('.panel.open').forEach(p => p.classList.remove('open'));
            closeMenu();
            openPanel('my-items-panel');
            
            const body = document.getElementById('my-items-body');
            if (!body) {
                console.error("Error: Element 'my-items-body' not found!");
                return;
            }
            
            body.innerHTML = '<p style="color:var(--gray);text-align:center;">טוען...</p>';

            try {
                const res = await fetch(`${API_BASE}/my-items/${deviceId}`);
                if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                
                const items = await res.json();

                if (!items || items.length === 0) {
                    body.innerHTML = '<p style="color:var(--gray);text-align:center;margin-top:40px;">אין לך פריטים עדיין.<br>לחץ על "+ פרסם פריט" להתחלה!</p>';
                    return;
                }

                body.innerHTML = items.map(item => {
                    // Prevent single quotes in titles or status from breaking HTML/JS execution
                    const safeTitle = (item.title || '').replace(/'/g, "\\'");
                    const safeStatus = (item.status || '').replace(/'/g, "\\'");

                    return `
                        <div class="item-card">
                            ${item.image_url ? `<img src="${item.image_url}" style="width:100%;height:150px;object-fit:cover;border-radius:8px;margin-bottom:8px;"/>` : ''}
                            <div class="item-card-title">${item.title || 'ללא כותרת'}</div>
                            <div class="item-card-meta">${item.category || 'כללי'} · ${item.request_count || 0} מתעניינים · ${item.status === 'available' ? 'זמין' : 'נלקח'}</div>
                            <div class="item-card-actions">
                                <button class="item-card-btn" style="background:#f0f0f0;color:var(--dark);"
                                    onclick="viewRequesters(${item.id}, '${safeTitle}')">מי רוצה?</button>
                                <button class="item-card-btn" style="background:${item.status === 'available' ? 'var(--green)' : 'var(--gray)'};color:white;"
                                    onclick="toggleItemStatus(${item.id}, '${safeStatus}')">
                                    ${item.status === 'available' ? 'סמן כנלקח' : 'החזר לזמין'}
                                </button>
                                <button class="item-card-btn" style="background:var(--accent);color:white;"
                                    onclick="deleteItem(${item.id})">מחק</button>
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (error) {
                console.error("Error loading panel data:", error);
                body.innerHTML = '<p style="color:red;text-align:center;margin-top:40px;">שגיאה בטעינת הנתונים. אנא וודא שהשרת פעיל.</p>';
            }
        }

        // --- 4. Placeholder Button Handlers ---
        // Add your fetch logic inside these functions to make them talk to your FastAPI backend
        
        function viewRequesters(itemId, itemTitle) {
            alert(`מציג מתעניינים עבור: ${itemTitle} (מזהה פריט: ${itemId})`);
        }

        async function toggleItemStatus(itemId, currentStatus) {
            const nextStatus = currentStatus === 'available' ? 'claimed' : 'available';
            alert(`משנה סטטוס פריט ${itemId} ל-${nextStatus}`);
            // After successful backend update, call openMyItems() again to refresh the list!
        }

        async function deleteItem(itemId) {
            if (confirm("האם אתה בטוח שברצונך למחוק פריט זה?")) {
                alert(`מוחק פריט מספר: ${itemId}`);
                // After successful backend delete, call openMyItems() again to refresh the list!
            }
        }
    </script>
</body>
</html>
